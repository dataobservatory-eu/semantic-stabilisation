project:
  type: book
  output-dir: _book
  
execute:
  freeze: auto

version: "0.0.2"

book:
  page-footer:
    center: 
      - text: "License"
        href: license.qmd
  title: "Semantic Stabilisation"
  subtitle: "A Pragmatic Research and Innovation Programme"
  downloads: [pdf, epub, docx] 
  output-file: semantic-stabilisation-v002
  author:
     - name: "Daniel Antal, CFA"
       orcid: 0000-0001-7513-6760
       affiliations:
               - name: Reprex
                 address: "Saturnusstraat 14"
                 city: The Hague
                 state: Zuid-Holland
                 country: The Netherlands
                 postal-code: "2516 AH"
  date: "2026-06-14"
  repo-url: https://github.com/dataobservatory-eu/semantic-stabilisation
  repo-actions: [edit]
  chapters:
    - index.qmd
    - glossary.qmd
    - innovation.qmd
    - empirical.qmd
    - projects.qmd
    - research.qmd
    - references.qmd

citation:
  container-title: "Semantic Stabilisation"
  doi: "10.5281/zenodo.18094885"
  url: https://downloads.reprex.nl/2026/semantic-stabilistaion/


csl: csl/chicago-author-date-17th-edition.csl

papersize: a4 
  
format:
  html:
    theme: cosmo
  pdf:
    documentclass: scrreprt
    classoption:
      - paper=a4
      - oneside
      - pagesize
      - BCOR=0mm
      - DIV=13   # try 12–13 for ~25 mm; 14–15 for ~20 mm
    fontsize: 12pt
  epub: default 
  docx: default

editor: visual

